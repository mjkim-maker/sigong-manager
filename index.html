<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시공관리 플랫폼</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Pretendard',-apple-system,sans-serif;background:#f5f6f8;min-height:100vh;display:flex;align-items:center;justify-content:center}
        .container{text-align:center;padding:40px 20px}
        .logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px}
        .logo .icon{width:48px;height:48px;background:#35C5F0;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff}
        .logo .text{font-size:26px;font-weight:700;color:#191F28}
        .sub{font-size:14px;color:#8B95A1;margin-bottom:40px}
        .cards{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;max-width:700px;margin:0 auto}
        .card{background:#fff;border:1px solid #E5E8EB;border-radius:16px;padding:32px 24px;width:200px;cursor:pointer;transition:all .2s;text-decoration:none;color:inherit}
        .card:hover{border-color:#35C5F0;box-shadow:0 4px 20px rgba(53,197,240,.12);transform:translateY(-2px)}
        .card-icon{font-size:36px;margin-bottom:12px}
        .card-title{font-size:16px;font-weight:700;color:#191F28;margin-bottom:6px}
        .card-desc{font-size:12px;color:#8B95A1;line-height:1.5}
        .footer{margin-top:40px;font-size:11px;color:#ADB5BD}
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><div class="icon">S</div><div class="text">시공관리</div></div>
        <div class="sub">시공 관리 플랫폼에 오신 것을 환영합니다</div>
        <div class="cards">
            <a class="card" href="admin.html">
                <div class="card-icon">📊</div>
                <div class="card-title">오늘의집 관리자</div>
                <div class="card-desc">전체 테크사 데이터<br>카테고리별 분석<br>이상감지 알림</div>
            </a>
            <a class="card" href="tech.html">
                <div class="card-icon">🏢</div>
                <div class="card-title">테크사</div>
                <div class="card-desc">시공자 관리<br>일정 등록 / 캘린더<br>AS 관리</div>
            </a>
            <a class="card" href="worker.html">
                <div class="card-icon">👷</div>
                <div class="card-title">시공자</div>
                <div class="card-desc">오늘 일정 확인<br>사진 등록<br>시공 완료 처리</div>
            </a>
        </div>
        <div class="footer">Prototype v2.2 · Firebase Realtime DB</div>
    </div>
</body>
</html>
