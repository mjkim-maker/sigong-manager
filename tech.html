<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시공관리 — 테크사</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Pretendard',-apple-system,sans-serif;background:#f5f6f8;color:#191F28;min-height:100vh;display:flex}
        .sidebar{width:220px;background:#1B1D1F;min-height:100vh;position:fixed;left:0;top:0;z-index:100;display:flex;flex-direction:column}
        .sidebar-logo{padding:24px 20px 8px;display:flex;align-items:center;gap:10px}
        .sidebar-logo .icon{width:32px;height:32px;background:#35C5F0;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff}
        .sidebar-logo .text{font-size:15px;font-weight:700;color:#fff}
        .sidebar-company{padding:8px 20px 16px;font-size:12px;color:#35C5F0;font-weight:500;border-bottom:1px solid rgba(255,255,255,.06)}
        .sidebar-nav{flex:1;padding:12px 10px;overflow-y:auto}
        .nav-group{font-size:10px;font-weight:600;color:#4E5968;padding:14px 10px 4px;letter-spacing:.5px}
        .nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;font-size:13px;font-weight:500;color:#8B95A1;cursor:pointer;margin-bottom:1px;transition:all .15s}
        .nav-item:hover{background:rgba(255,255,255,.06);color:#D1D6DB}
        .nav-item.active{background:rgba(53,197,240,.12);color:#35C5F0;font-weight:600}
        .nav-item .ico{width:18px;text-align:center;font-size:13px}
        .nav-item .badge{margin-left:auto;background:#F04452;color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px}
        .sidebar-footer{padding:14px 20px;border-top:1px solid rgba(255,255,255,.06);font-size:11px;color:#4E5968}
        .main-wrap{margin-left:220px;flex:1;min-height:100vh}
        .top-bar{background:#fff;border-bottom:1px solid #E5E8EB;padding:0 28px;height:52px;display:flex;align-items:center;position:sticky;top:0;z-index:50}
        .top-bar-title{font-size:16px;font-weight:700}
        .top-bar-right{margin-left:auto;display:flex;align-items:center;gap:14px}
        .avatar{width:28px;height:28px;border-radius:50%;background:#35C5F0;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
        .content{padding:24px 28px;max-width:1400px}
        .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
        .kpi{background:#fff;border-radius:12px;padding:18px 20px;border:1px solid #E5E8EB}
        .kpi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
        .kpi-label{font-size:12px;color:#6B7684;font-weight:500}
        .kpi-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px}
        .kpi-value{font-size:26px;font-weight:700;color:#191F28;margin-bottom:3px}
        .kpi-value span{font-size:13px;color:#8B95A1;font-weight:400}
        .kpi-sub{font-size:11px;color:#8B95A1;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
        .up{color:#00B140;font-weight:600}.down{color:#F04452;font-weight:600}.warn{color:#FF7E36;font-weight:600}
        .card{background:#fff;border-radius:12px;border:1px solid #E5E8EB;padding:20px;margin-bottom:14px}
        .card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
        .card-t{font-size:14px;font-weight:600}
        .card-sub{font-size:11px;color:#8B95A1;background:#F2F4F6;padding:3px 10px;border-radius:5px}
        .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
        .grid-6-4{display:grid;grid-template-columns:6fr 4fr;gap:14px;margin-bottom:14px}
        .chart-box{position:relative;height:280px}.chart-box.sm{height:220px}
        .tbl{width:100%;border-collapse:collapse;font-size:12px}
        .tbl th{text-align:left;padding:9px 10px;font-weight:600;color:#6B7684;border-bottom:2px solid #E5E8EB;font-size:11px;background:#FAFBFC;white-space:nowrap}
        .tbl td{padding:9px 10px;border-bottom:1px solid #F2F4F6}
        .tbl tr:hover td{background:#F7F8FA}
        .tbl .r{text-align:right;font-variant-numeric:tabular-nums}
        .tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;white-space:nowrap}
        .tag-blue{background:#E8F4FD;color:#0077B6}.tag-green{background:#E8F8EF;color:#00875A}
        .tag-orange{background:#FFF3E8;color:#D46B08}.tag-red{background:#FFEEF0;color:#F04452}
        .tag-purple{background:#F3EAFF;color:#6B21A8}.tag-gray{background:#F2F4F6;color:#6B7684}
        .source-api{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;background:#E0F7FA;color:#00838F}
        .source-self{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;background:#F2F4F6;color:#8B95A1}
        .stars{color:#FFB800}.stars .empty{color:#E5E8EB}
        .cert-ok{background:#E8F8EF;color:#00875A;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;display:inline-flex;align-items:center;gap:4px}
        .cert-warn{background:#FFF3E8;color:#D46B08;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;display:inline-flex;align-items:center;gap:4px}
        .cert-danger{background:#FFEEF0;color:#F04452;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;display:inline-flex;align-items:center;gap:4px}
        .cert-expired{background:#F04452;color:#fff;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;display:inline-flex;align-items:center;gap:4px}
        .alert-banner{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:10px;margin-bottom:12px;font-size:12px}
        .alert-banner.warning{background:#FFF8E8;border:1px solid #FFE0A0;color:#8B6914}
        .alert-icon{font-size:16px;flex-shrink:0}.alert-text{flex:1}.alert-text strong{font-weight:700}
        .timeline-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #F2F4F6}
        .timeline-item:last-child{border-bottom:none}
        .timeline-time{font-size:11px;color:#8B95A1;width:50px;flex-shrink:0;padding-top:2px}
        .timeline-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
        .timeline-content{flex:1}.timeline-title{font-size:12px;font-weight:600;margin-bottom:2px}.timeline-desc{font-size:11px;color:#6B7684}
        .as-code-group{margin-bottom:12px}
        .as-code-cat{font-size:12px;font-weight:700;padding:8px 0 4px;display:flex;align-items:center;gap:6px}
        .as-code-list{display:flex;flex-wrap:wrap;gap:5px;padding-left:24px}
        .as-code{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500;background:#F2F4F6;color:#4E5968}
        .cal-wrap{background:#fff;border-radius:12px;border:1px solid #E5E8EB;padding:20px;margin-bottom:14px}
        .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
        .cal-title{font-size:15px;font-weight:700}
        .cal-nav{display:flex;gap:6px}
        .cal-nav button{width:30px;height:30px;border-radius:8px;border:1px solid #E5E8EB;background:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
        .cal-nav button:hover{border-color:#35C5F0;color:#35C5F0}
        .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
        .cal-dow{font-size:10px;color:#8B95A1;font-weight:600;padding:6px 0}
        .cal-cell{padding:6px 2px;border-radius:8px;cursor:pointer;min-height:64px;font-size:12px;transition:background .1s}
        .cal-cell:hover{background:#F7F8FA}.cal-cell.today{background:#E8F4FD}.cal-cell.selected{background:#35C5F0;color:#fff}
        .cal-cell.selected .cal-count{color:#fff}.cal-cell.other{color:#D1D6DB}
        .cal-cell .cal-num{font-weight:600;margin-bottom:2px}
        .cal-cell .cal-dots{display:flex;justify-content:center;gap:3px;margin-top:2px}
        .cal-dot-job{width:5px;height:5px;border-radius:50%;background:#35C5F0}
        .cal-dot-as{width:5px;height:5px;border-radius:50%;background:#F04452}
        .cal-count{font-size:10px;color:#6B7684;margin-top:1px}
        .cal-legend{display:flex;gap:16px;margin-top:10px;font-size:11px;color:#8B95A1}
        .cal-legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
        .day-detail{background:#fff;border-radius:12px;border:1px solid #E5E8EB;padding:20px}
        .day-detail-title{font-size:14px;font-weight:700;margin-bottom:12px}
        .day-job{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #F2F4F6}
        .day-job:last-child{border-bottom:none}
        .day-job-time{font-size:14px;font-weight:700;width:50px;flex-shrink:0}
        .day-job-info{flex:1}.day-job-title{font-size:12px;font-weight:600;margin-bottom:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
        .day-job-desc{font-size:11px;color:#6B7684}.day-job-status{flex-shrink:0}
        .btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;border:none;cursor:pointer}
        .btn-primary{background:#35C5F0;color:#fff}.btn-primary:hover{background:#20B2E0}
        .btn-outline{background:#fff;color:#4E5968;border:1px solid #D1D6DB}
        .btn-sm{padding:5px 10px;font-size:11px;border-radius:6px}
        .modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
        .modal-overlay.show{display:flex}
        .modal{background:#fff;border-radius:16px;padding:28px;width:580px;max-height:88vh;overflow-y:auto}
        .modal-title{font-size:17px;font-weight:700;margin-bottom:20px}
        .form-group{margin-bottom:14px}.form-label{display:block;font-size:12px;font-weight:600;color:#4E5968;margin-bottom:5px}
        .form-label .req{color:#F04452}
        .form-input{width:100%;padding:9px 12px;border:1px solid #D1D6DB;border-radius:8px;font-size:13px;font-family:inherit;outline:none}
        .form-input:focus{border-color:#35C5F0}
        .form-select{width:100%;padding:9px 12px;border:1px solid #D1D6DB;border-radius:8px;font-size:13px;font-family:inherit;background:#fff}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        .form-hint{font-size:10px;color:#8B95A1;margin-top:3px}
        .form-section{font-size:13px;font-weight:700;padding:12px 0 8px;margin-top:8px;border-top:1px solid #F2F4F6}
        .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid #F2F4F6}
        .login-wrap{position:fixed;top:0;left:0;right:0;bottom:0;background:#f5f6f8;z-index:300;display:flex;align-items:center;justify-content:center}
        .login-wrap.hide{display:none}
        .login-box{background:#fff;border-radius:20px;padding:48px 40px;width:420px;box-shadow:0 8px 40px rgba(0,0,0,.08);text-align:center}
        .login-logo2{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px}
        .login-logo2 .icon{width:40px;height:40px;background:#35C5F0;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff}
        .login-logo2 .text{font-size:20px;font-weight:700}
        .login-sub{font-size:13px;color:#8B95A1;margin-bottom:32px}
        .login-form .form-group{text-align:left;margin-bottom:16px}
        .login-btn{width:100%;padding:12px;border:none;border-radius:10px;background:#35C5F0;color:#fff;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:8px}
        .login-error{color:#F04452;font-size:12px;text-align:center;margin-top:10px;min-height:16px}
        .login-accounts{margin-top:16px;padding:12px;background:#F7F8FA;border-radius:10px;font-size:11px;color:#6B7684;text-align:left}
        .login-accounts div{padding:2px 0}
        .toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#191F28;color:#fff;padding:12px 24px;border-radius:10px;font-size:13px;font-weight:600;z-index:400;opacity:0;transition:opacity .3s;pointer-events:none}
        .toast.show{opacity:1}
        .kpi-grid-6{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:20px}
        .kpi-mini{font-size:11px;color:#8B95A1;display:flex;align-items:center;gap:3px;margin-top:2px}
        .progress-bar{height:6px;background:#F2F4F6;border-radius:3px;margin-top:8px;overflow:hidden}
        .progress-fill{height:100%;border-radius:3px;transition:width .3s}
        .as-register-card{background:#fff;border-radius:12px;border:1px solid #E5E8EB;padding:16px;margin-bottom:14px}
        .as-register-card:hover{border-color:#35C5F0;cursor:pointer}
        @media(max-width:1400px){.kpi-grid-6{grid-template-columns:repeat(3,1fr)}}
        @media(max-width:1200px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.kpi-grid-6{grid-template-columns:repeat(2,1fr)}.grid-2,.grid-6-4{grid-template-columns:1fr}}
        @media(max-width:768px){.sidebar{display:none}.main-wrap{margin-left:0}}
    </style>
</head>
<body>
<div class="toast" id="toast"></div>

<div class="login-wrap" id="loginScreen">
    <div class="login-box">
        <div class="login-logo2"><div class="icon">S</div><div class="text">시공관리</div></div>
        <div class="login-sub">테크사 관리 포털</div>
        <div class="login-form">
            <div class="form-group"><label class="form-label">아이디</label><input type="text" class="form-input" id="loginId" placeholder="아이디"></div>
            <div class="form-group"><label class="form-label">비밀번호</label><input type="password" class="form-input" id="loginPw" placeholder="비밀번호"></div>
            <button class="login-btn" onclick="doLogin()">로그인</button>
            <div class="login-error" id="loginError"></div>
        </div>
        <div class="login-accounts">
            <strong>테스트 계정 (테크사)</strong>
            <div>first-cs / first123 — 퍼스트씨에스</div>
            <div>juwon / juwon123 — 주원씨앤아이</div>
            <div>daon / daon123 — 다온이엔지</div>
        </div>
    </div>
</div>

<aside class="sidebar">
    <div class="sidebar-logo"><div class="icon">S</div><div class="text">시공관리</div></div>
    <div class="sidebar-company" id="sidebarCompany">—</div>
    <nav class="sidebar-nav">
        <div class="nav-group">관리</div>
        <div class="nav-item active" onclick="go('home',this)"><span class="ico">📊</span> 대시보드</div>
        <div class="nav-item" onclick="go('workers',this)"><span class="ico">👷</span> 시공자 관리</div>
        <div class="nav-item" onclick="go('schedule',this)"><span class="ico">📅</span> 일정 등록</div>
        <div class="nav-item" onclick="go('history',this)"><span class="ico">📋</span> 시공 이력</div>
        <div class="nav-item" onclick="go('as',this)"><span class="ico">🔧</span> AS 관리</div>
        <div class="nav-group">설정</div>
        <div class="nav-item" onclick="go('settings',this)"><span class="ico">⚙️</span> 시공자 권한설정</div>
    </nav>
    <div class="sidebar-footer">테크사 포털 v2.2</div>
</aside>

<div class="main-wrap">
    <header class="top-bar">
        <div class="top-bar-title" id="pageTitle">대시보드</div>
        <div class="top-bar-right">
            <div style="font-size:12px;color:#8B95A1">2026.03.31</div>
            <div style="display:flex;align-items:center;gap:8px"><div class="avatar" id="userAvatar">—</div><span style="font-size:13px;font-weight:500;color:#4E5968" id="userName">—</span></div>
        </div>
    </header>
    <div class="content" id="contentArea"></div>
</div>

<div class="modal-overlay" id="scheduleModal" onclick="if(event.target===this)closeModal()">
    <div class="modal">
        <div class="modal-title">📅 시공 일정 등록</div>
        <div class="form-row"><div class="form-group"><label class="form-label">시공일자<span class="req">*</span></label><input type="date" class="form-input" id="schDate" value="2026-04-01"></div><div class="form-group"><label class="form-label">시공 시간<span class="req">*</span></label><input type="time" class="form-input" id="schTime" value="09:00"></div></div>
        <div class="form-group"><label class="form-label">시공자 배정<span class="req">*</span></label><select class="form-select" id="schWorker"></select></div>
        <div class="form-group"><label class="form-label">카테고리<span class="req">*</span></label><select class="form-select" id="schCat"></select></div>
        <div class="form-group"><label class="form-label">시공 유형</label><input type="text" class="form-input" id="schType" placeholder="예: 시스템에어컨 설치"></div>
        <div class="form-section">현장 / 고객</div>
        <div class="form-group"><label class="form-label">현장 주소<span class="req">*</span></label><input type="text" class="form-input" id="schAddr" placeholder="주소"><div class="form-hint">시공자 앱에서 네비 연결됩니다</div></div>
        <div class="form-row"><div class="form-group"><label class="form-label">고객명<span class="req">*</span></label><input type="text" class="form-input" id="schCustomer"></div><div class="form-group"><label class="form-label">연락처<span class="req">*</span></label><input type="tel" class="form-input" id="schPhone" placeholder="010-0000-0000"></div></div>
        <div class="form-section">연동</div>
        <div class="form-row"><div class="form-group"><label class="form-label">출처</label><select class="form-select" id="schSource"><option value="self">자체 등록</option><option value="api">오늘의집 API</option></select></div><div class="form-group"><label class="form-label">외부 주문번호</label><input type="text" class="form-input" id="schExtId" placeholder="API 연동 시 자동"></div></div>
        <div class="form-group"><label class="form-label">메모</label><input type="text" class="form-input" id="schMemo"></div>
        <div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">취소</button><button class="btn btn-primary" onclick="submitSchedule()">등록</button></div>
    </div>
</div>

<!-- AS 등록 모달 -->
<div class="modal-overlay" id="asModal" onclick="if(event.target===this)closeAsModal()">
    <div class="modal">
        <div class="modal-title">🔧 AS 등록 — 완료 건에서 접수</div>
        <div class="form-row" style="margin-bottom:10px">
            <div class="form-group">
                <label class="form-label">월 선택</label>
                <select class="form-select" id="asMonth" onchange="filterAsJobs()"></select>
            </div>
            <div class="form-group">
                <label class="form-label">검색 (고객명/주소/시공번호)</label>
                <input type="text" class="form-input" id="asSearch" placeholder="검색어 입력" oninput="filterAsJobs()">
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">원시공 선택 <span class="req">*</span> <span id="asJobCount" style="font-weight:400;color:#8B95A1"></span></label>
            <div id="asJobList" style="max-height:220px;overflow-y:auto;border:1px solid #E5E8EB;border-radius:8px;background:#fff"></div>
            <input type="hidden" id="asOrigJob">
        </div>
        <div id="asOrigInfo" style="display:none;background:#F7F8FA;border-radius:10px;padding:14px;margin-bottom:14px;font-size:12px;line-height:1.8"></div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">카테고리</label>
                <input type="text" class="form-input" id="asCat" readonly style="background:#F7F8FA">
            </div>
            <div class="form-group">
                <label class="form-label">AS 유형코드 <span class="req">*</span></label>
                <select class="form-select" id="asCode"></select>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">증상/이슈 <span class="req">*</span></label>
            <input type="text" class="form-input" id="asIssue" placeholder="고객이 보고한 증상을 입력하세요">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">고객명</label>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="shared-data.js"></script>
<script>
let currentUser=null, cid=null, charts={}, calState={year:2026,month:2,selectedDate:'2026-03-31'};
const titles={home:'대시보드',workers:'시공자 관리',schedule:'일정 등록',history:'시공 이력',as:'AS 관리',settings:'시공자 권한설정'};

DB.init();
DB.seedIfEmpty();

function doLogin(){
    if(!DB._ready){document.getElementById('loginError').textContent='데이터 로딩중... 잠시 후 다시 시도';return}
    const id=document.getElementById('loginId').value.trim(),pw=document.getElementById('loginPw').value.trim();
    if(!id||!pw){document.getElementById('loginError').textContent='아이디와 비밀번호를 입력하세요';return}
    const acc=DB.getAll('accounts').find(a=>a.loginId===id&&a.password===pw&&(a.role==='tech'||a.role==='tech-mgr'));
    if(!acc){document.getElementById('loginError').textContent='테크사 계정이 아니거나 정보가 올바르지 않습니다';return}
    currentUser=acc;cid=acc.companyId;
    const comp=DB.getById('companies',cid);
    document.getElementById('loginScreen').classList.add('hide');
    document.getElementById('sidebarCompany').textContent=comp?.name||'';
    document.getElementById('userAvatar').textContent=acc.avatar;
    document.getElementById('userName').textContent=comp?.name||acc.name;
    render('home');
}
function go(p,el){document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));el.classList.add('active');render(p)}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function openModal(){
    const comp=DB.getById('companies',cid),workers=DB.getAll('workers').filter(w=>w.companyId===cid);
    document.getElementById('schWorker').innerHTML=workers.map(w=>`<option value="${w.id}">${w.name} (${w.skill})</option>`).join('');
    document.getElementById('schCat').innerHTML=(comp?.cats||[]).map(c=>`<option>${c}</option>`).join('');
    ['schType','schAddr','schCustomer','schPhone','schExtId','schMemo'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('scheduleModal').classList.add('show');
}
function closeModal(){document.getElementById('scheduleModal').classList.remove('show')}
function submitSchedule(){
    const d=document.getElementById('schDate').value,t=document.getElementById('schTime').value,w=document.getElementById('schWorker').value,
          cat=document.getElementById('schCat').value,addr=document.getElementById('schAddr').value.trim(),cust=document.getElementById('schCustomer').value.trim(),ph=document.getElementById('schPhone').value.trim();
    if(!d||!t||!w||!cat||!addr||!cust||!ph){showToast('필수 항목을 모두 입력하세요');return}
    DB.add('jobs',{id:DB.genId('S'),companyId:cid,workerId:w,date:d,time:t,cat,type:document.getElementById('schType').value.trim()||cat,addr,customer:cust,phone:ph,
        source:document.getElementById('schSource').value,extId:document.getElementById('schExtId').value.trim()||null,status:'waiting',startedAt:null,completedAt:null,photos:{before:0,during:0,after:0},
        memo:document.getElementById('schMemo').value.trim(),isAS:false,createdAt:new Date().toISOString()});
    closeModal();showToast('일정이 등록되었습니다');render('schedule');
}

// Calendar helpers
function calHtml(jobs,scope){
    const{year,month}=calState,mStr=`${year}-${String(month+1).padStart(2,'0')}`,mJobs=jobs.filter(j=>j.date?.startsWith(mStr));
    const first=new Date(year,month,1).getDay(),dim=new Date(year,month+1,0).getDate(),today=new Date(),isCur=today.getFullYear()===year&&today.getMonth()===month;
    const mn=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
    let cells='';['일','월','화','수','목','금','토'].forEach(d=>cells+=`<div class="cal-dow">${d}</div>`);
    for(let i=0;i<first;i++)cells+='<div class="cal-cell other"></div>';
    for(let d=1;d<=dim;d++){
        const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const dj=mJobs.filter(j=>j.date===ds),hasJ=dj.some(j=>!j.isAS),hasA=dj.some(j=>j.isAS);
        let cls='cal-cell';if(isCur&&d===today.getDate())cls+=' today';if(calState.selectedDate===ds)cls+=' selected';
        let dots='';if(hasJ)dots+='<div class="cal-dot-job"></div>';if(hasA)dots+='<div class="cal-dot-as"></div>';
        cells+=`<div class="${cls}" onclick="selDate('${ds}')"><div class="cal-num">${d}</div><div class="cal-dots">${dots}</div>${dj.length?`<div class="cal-count">${dj.length}건</div>`:''}</div>`;
    }
    return `<div class="cal-wrap"><div class="cal-head"><div class="cal-title">${year}년 ${mn[month]}</div><div style="display:flex;gap:8px;align-items:center"><div class="cal-legend"><span><div class="cal-legend-dot" style="background:#35C5F0;display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle"></div>시공</span><span><div class="cal-legend-dot" style="background:#F04452;display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle"></div>AS</span></div><div class="cal-nav"><button onclick="chMonth(-1)">◀</button><button onclick="chMonth(1)">▶</button></div></div></div><div class="cal-grid">${cells}</div></div>`;
}
function dayHtml(jobs,ds){
    const dj=jobs.filter(j=>j.date===ds).sort((a,b)=>a.time.localeCompare(b.time));
    const dow=['일','월','화','수','목','금','토'],dt=new Date(ds),label=`${dt.getMonth()+1}월 ${dt.getDate()}일 (${dow[dt.getDay()]})`;
    if(!dj.length)return `<div class="day-detail"><div class="day-detail-title">${label}</div><div style="text-align:center;padding:24px;color:#ADB5BD;font-size:12px">일정 없음</div></div>`;
    const done=dj.filter(j=>j.status==='done').length;
    let h=dj.map(j=>{const w=DB.getById('workers',j.workerId);let sc=j.status==='done'?'tag-green':j.status==='progress'?'tag-blue':'tag-gray',st=j.status==='done'?'완료':j.status==='progress'?'진행중':'대기';if(j.isAS){sc='tag-orange';st='AS';}
        const p=j.photos||{before:0,during:0,after:0};let pi=(p.before||p.during||p.after)?`<span style="font-size:10px;color:#00875A;margin-left:6px">📸${p.before+p.during+p.after}</span>`:'';
        return `<div class="day-job"><div class="day-job-time">${j.time}</div><div class="day-job-info"><div class="day-job-title"><span class="tag tag-blue">${j.cat}</span> ${w?.name||'—'} ${j.source==='api'?'<span class="source-api">API</span>':''}${pi}</div><div class="day-job-desc">${j.customer} · ${j.addr}</div></div><div class="day-job-status"><span class="tag ${sc}">${st}</span></div></div>`;
    }).join('');
    return `<div class="day-detail"><div class="day-detail-title">${label} — ${dj.length}건 (완료 ${done})</div>${h}</div>`;
}
function chMonth(d){calState.month+=d;if(calState.month>11){calState.month=0;calState.year++}if(calState.month<0){calState.month=11;calState.year--}calState.selectedDate=null;render(currentPage)}
function selDate(ds){calState.selectedDate=ds;render(currentPage)}

let currentPage='home';
function render(p){
    currentPage=p;document.getElementById('pageTitle').textContent=titles[p]||'';Object.values(charts).forEach(c=>c.destroy());charts={};
    const jobs=DB.getAll('jobs').filter(j=>j.companyId===cid),area=document.getElementById('contentArea');
    const stats=HELPERS.companyStats(cid),workers=DB.getAll('workers').filter(w=>w.companyId===cid);
    const certWarns=workers.filter(w=>w.certs?.some(c=>HELPERS.certStatus(c.expiry).days<30));

    if(p==='home'){
        const todayJobs=jobs.filter(j=>j.date==='2026-03-31').sort((a,b)=>a.time.localeCompare(b.time));
        const allAS=DB.getAll('asTickets').filter(a=>a.companyId===cid&&a.date?.startsWith('2026-03'));
        const openAS=allAS.filter(a=>a.status==='open');
        const inProgressAS=allAS.filter(a=>a.status==='in_progress');
        const resolvedAS=allAS.filter(a=>a.status==='resolved');
        // 남은 시공건 (대기+진행)
        const monthJobs=jobs.filter(j=>j.date?.startsWith('2026-03'));
        const remaining=monthJobs.filter(j=>j.status!=='done').length;
        const delayed=jobs.filter(j=>j.status==='waiting'&&j.date<'2026-03-31').length;
        // AS 발생율
        const asRate=monthJobs.length?Math.round(allAS.length/monthJobs.length*1000)/10:0;
        // AS 재발율: 같은 현장(origJobId)에서 2건 이상 AS가 있는 경우
        const origCounts={};allAS.forEach(a=>{origCounts[a.origJobId]=(origCounts[a.origJobId]||0)+1});
        const recurringAS=Object.values(origCounts).filter(c=>c>=2).length;
        const recurRate=allAS.length?Math.round(recurringAS/allAS.length*1000)/10:0;

        let alert='';if(certWarns.length){const ns=certWarns.map(w=>{const c=w.certs.find(c=>HELPERS.certStatus(c.expiry).days<30);return `${w.name} (${c.name} ${c.expiry.substring(5,10)})`}).join(', ');
            alert=`<div class="alert-banner warning"><div class="alert-icon">⚠️</div><div class="alert-text"><strong>자격증 만료 임박 ${certWarns.length}건</strong> — ${ns}</div></div>`}
        let tl=todayJobs.map(j=>{const w=DB.getById('workers',j.workerId);let dc=j.status==='done'?'#00B140':j.status==='progress'?'#35C5F0':'#D1D6DB',sc=j.status==='done'?'tag-green':j.status==='progress'?'tag-blue':'tag-gray',st=j.status==='done'?'완료':j.status==='progress'?'진행중':'대기';
            return `<div class="timeline-item"><div class="timeline-time">${j.time}</div><div class="timeline-dot" style="background:${dc}"></div><div class="timeline-content"><div class="timeline-title">${w?.name||'—'} · <span class="tag tag-blue">${j.cat}</span> ${j.source==='api'?'<span class="source-api">API</span>':''}</div><div class="timeline-desc">${j.addr} · ${j.customer} <span class="tag ${sc}" style="margin-left:4px">${st}</span></div></div></div>`;}).join('');
        if(!todayJobs.length)tl='<div style="text-align:center;padding:20px;color:#ADB5BD;font-size:12px">오늘 일정 없음</div>';
        // AS 미처리 목록
        let asH=openAS.concat(inProgressAS).slice(0,5).map(a=>{const w=DB.getById('workers',a.workerId);const sc=a.status==='open'?'tag-red':'tag-orange',st=a.status==='open'?'미처리':'처리중';return `<div style="display:flex;align-items:center;padding:8px 0;border-bottom:1px solid #F2F4F6;gap:10px"><div style="flex:1"><div style="font-size:12px;font-weight:600"><span class="tag tag-purple" style="margin-right:4px">${a.code}</span>${a.issue}</div><div style="font-size:11px;color:#8B95A1">${HELPERS.formatDate(a.date)} · ${a.customer} · ${w?.name||'—'}</div></div><span class="tag ${sc}">${st}</span></div>`}).join('');
        if(!openAS.length&&!inProgressAS.length)asH='<div style="text-align:center;padding:16px;color:#ADB5BD;font-size:12px">미처리 AS 없음</div>';
        // 완료율 프로그레스바 색상
        const rateColor=stats.rate>=88?'#00B140':stats.rate>=85?'#FFB800':'#F04452';
        area.innerHTML=`${alert}
        <div class="kpi-grid-6">
            <div class="kpi"><div class="kpi-top"><div class="kpi-label">월 시공</div><div class="kpi-icon" style="background:#E8F8EF;color:#00875A">📋</div></div><div class="kpi-value">${stats.monthlyJobs} <span>건</span></div><div class="kpi-sub">완료 <span class="up">${stats.monthlyDone}</span> · 잔여 <span class="warn">${remaining}</span></div><div class="progress-bar"><div class="progress-fill" style="width:${stats.rate}%;background:${rateColor}"></div></div></div>
            <div class="kpi"><div class="kpi-top"><div class="kpi-label">완료율</div><div class="kpi-icon" style="background:#FFF3E8;color:#D46B08">✅</div></div><div class="kpi-value"><span class="${HELPERS.rateClass(stats.rate)}">${stats.rate}</span> <span>%</span></div><div class="kpi-sub">${delayed?`지연 <span class="down">${delayed}건</span>`:'지연 없음'}</div></div>
            <div class="kpi"><div class="kpi-top"><div class="kpi-label">AS 요청</div><div class="kpi-icon" style="background:#FFEEF0;color:#F04452">🔧</div></div><div class="kpi-value">${allAS.length} <span>건</span></div><div class="kpi-sub">미처리 <span class="down">${openAS.length}</span> · 처리중 <span class="warn">${inProgressAS.length}</span> · 완료 <span class="up">${resolvedAS.length}</span></div></div>
            <div class="kpi"><div class="kpi-top"><div class="kpi-label">AS 처리현황</div><div class="kpi-icon" style="background:#E8F4FD;color:#0077B6">📊</div></div><div class="kpi-value">${allAS.length?Math.round(resolvedAS.length/allAS.length*100):0} <span>%</span></div><div class="progress-bar"><div class="progress-fill" style="width:${allAS.length?Math.round(resolvedAS.length/allAS.length*100):0}%;background:#0077B6"></div></div><div class="kpi-mini">${resolvedAS.length}/${allAS.length} 처리완료</div></div>
            <div class="kpi"><div class="kpi-top"><div class="kpi-label">AS 발생율</div><div class="kpi-icon" style="background:#F3EAFF;color:#6B21A8">📈</div></div><div class="kpi-value"><span class="${HELPERS.asRateClass(asRate)}">${asRate}</span> <span>%</span></div><div class="kpi-sub">시공 대비 AS 비율</div></div>
            <div class="kpi"><div class="kpi-top"><div class="kpi-label">AS 재발율</div><div class="kpi-icon" style="background:#FFF3E8;color:#D46B08">🔄</div></div><div class="kpi-value"><span class="${recurRate>0?'down':''}">${recurRate}</span> <span>%</span></div><div class="kpi-sub">동일 현장 반복 ${recurringAS}건</div></div>
        </div>
        <div class="grid-6-4">
            <div class="card"><div class="card-h"><div class="card-t">오늘의 시공 일정</div><div style="display:flex;gap:6px"><span class="card-sub">03.31 · ${todayJobs.length}건</span><button class="btn btn-primary btn-sm" onclick="openModal()">+ 일정 등록</button></div></div>${tl}</div>
            <div><div class="card"><div class="card-h"><div class="card-t">AS 현황</div><div style="display:flex;gap:6px"><button class="btn btn-sm" style="background:#F04452;color:#fff" onclick="openAsModal()">+ AS 등록</button></div></div>${asH}</div>
                <div class="card"><div class="card-h"><div class="card-t">카테고리별</div></div><div class="chart-box sm"><canvas id="catChart"></canvas></div></div></div>
        </div>
        <div class="grid-2">
            <div class="card"><div class="card-h"><div class="card-t">월별 시공 추이</div></div><div class="chart-box sm"><canvas id="monthChart"></canvas></div></div>
            <div>${calHtml(jobs,'home')}<div style="margin-top:14px">${dayHtml(jobs,calState.selectedDate||'2026-03-31')}</div></div>
        </div>`;
        // Charts
        const cats={};jobs.filter(j=>j.date?.startsWith('2026-03')).forEach(j=>{cats[j.cat]=(cats[j.cat]||0)+1});
        const cl=Object.keys(cats),cd=Object.values(cats),co=['#1e40af','#3b82f6','#60a5fa','#93c5fd','#0ea5e9'];
        if(cl.length)charts.cat=new Chart(document.getElementById('catChart'),{type:'doughnut',data:{labels:cl,datasets:[{data:cd,backgroundColor:co.slice(0,cl.length),borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'58%',plugins:{legend:{position:'bottom',labels:{font:{size:11,family:'Pretendard'},padding:10,usePointStyle:true}}}}});
        const md={};jobs.forEach(j=>{if(!j.date)return;const m=j.date.substring(0,7);if(!md[m])md[m]={t:0,d:0};md[m].t++;if(j.status==='done')md[m].d++});
        const ms=Object.keys(md).sort().slice(-6);
        if(ms.length)charts.month=new Chart(document.getElementById('monthChart'),{type:'bar',data:{labels:ms.map(m=>m.substring(2)),datasets:[{label:'전체',data:ms.map(m=>md[m].t),backgroundColor:'rgba(53,197,240,.15)',borderColor:'#35C5F0',borderWidth:1.5,borderRadius:4,order:2},{label:'완료',data:ms.map(m=>md[m].d),type:'line',borderColor:'#1e40af',borderWidth:2,pointRadius:3,pointBackgroundColor:'#1e40af',tension:.3,order:1}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:11,family:'Pretendard'},usePointStyle:true,padding:14}}},scales:{x:{grid:{display:false}},y:{beginAtZero:true,grid:{color:'#F2F4F6'}}}}});
    } else if(p==='workers'){
        let rows=workers.map(w=>{const s=HELPERS.workerStats(w.id),c=w.certs?.[0],cs=c?HELPERS.certStatus(c.expiry):null;
            return `<tr><td style="font-weight:600">${w.name}</td><td>${w.phone}</td><td><span class="tag tag-blue">${w.skill}</span></td><td style="font-size:11px">${w.area}</td><td>${c?`<span class="${cs.cls}">${cs.icon} ${cs.text}</span>`:'—'}</td><td class="r">${s.monthlyJobs}</td><td class="r"><span class="${HELPERS.rateClass(s.rate)}">${s.rate}%</span></td><td>${HELPERS.starsHtml(parseFloat(s.avgRating)||0,'11px')}</td></tr>`}).join('');
        area.innerHTML=`<div class="card"><div class="card-h"><div class="card-t">시공자 목록 (${workers.length}명)</div></div><div style="overflow-x:auto"><table class="tbl"><thead><tr><th>이름</th><th>연락처</th><th>전문분야</th><th>담당지역</th><th>자격증 만료</th><th class="r">시공</th><th class="r">완료율</th><th>평점</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
    } else if(p==='schedule'){
        const upcoming=jobs.filter(j=>j.status==='waiting').sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
        let ur=upcoming.slice(0,15).map(j=>{const w=DB.getById('workers',j.workerId);return `<tr><td style="font-family:monospace;font-size:11px;color:#6B7684">${j.id}</td><td>${j.date?.substring(5)} ${j.time}</td><td style="font-weight:500">${w?.name||'—'}</td><td><span class="tag tag-blue">${j.cat}</span></td><td style="font-size:11px">${j.addr}</td><td>${j.customer}</td><td>${j.source==='api'?'<span class="source-api">API</span>':'<span class="source-self">자체</span>'}</td></tr>`}).join('');
        area.innerHTML=`<div style="display:flex;justify-content:flex-end;margin-bottom:14px"><button class="btn btn-primary" onclick="openModal()">+ 일정 등록</button></div>
        <div class="grid-6-4">${calHtml(jobs,'schedule')}<div>${dayHtml(jobs,calState.selectedDate||'2026-03-31')}</div></div>
        <div class="card"><div class="card-h"><div class="card-t">대기중 일정</div><div class="card-sub">${upcoming.length}건</div></div><div style="overflow-x:auto"><table class="tbl"><thead><tr><th>시공번호</th><th>일시</th><th>시공자</th><th>카테고리</th><th>현장</th><th>고객</th><th>출처</th></tr></thead><tbody>${ur}</tbody></table></div></div>`;
    } else if(p==='history'){
        const done=jobs.filter(j=>j.status==='done').sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time));
        const fbs=DB.getAll('feedback');
        let rows=done.slice(0,40).map(j=>{const w=DB.getById('workers',j.workerId),fb=fbs.find(f=>f.jobId===j.id),ph=j.photos||{before:0,during:0,after:0};
            return `<tr><td style="font-family:monospace;font-size:11px;color:#6B7684">${j.id}</td><td>${j.date?.substring(5)} ${j.time}</td><td style="font-weight:500">${w?.name||'—'}</td><td><span class="tag tag-blue">${j.cat}</span></td><td style="font-size:11px">${j.addr}</td><td>${(ph.before||ph.during||ph.after)?`<span style="font-size:11px;color:#00875A">전${ph.before}/중${ph.during}/후${ph.after}</span>`:'—'}</td><td>${fb?HELPERS.starsHtml(fb.rating,'11px'):'—'}</td></tr>`}).join('');
        area.innerHTML=`<div class="card"><div class="card-h"><div class="card-t">시공 이력 (완료)</div><div class="card-sub">${done.length}건</div></div><div style="overflow-x:auto"><table class="tbl"><thead><tr><th>시공번호</th><th>일시</th><th>시공자</th><th>카테고리</th><th>현장</th><th>사진</th><th>평점</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
    } else if(p==='as'){
        const tickets=DB.getAll('asTickets').filter(a=>a.companyId===cid).sort((a,b)=>b.date.localeCompare(a.date));
        const open=tickets.filter(a=>a.status==='open'),inP=tickets.filter(a=>a.status==='in_progress');
        const comp=DB.getById('companies',cid);let acH='';
        (comp?.cats||[]).forEach(cat=>{const codes=AS_CODES[cat];if(codes)acH+=`<div class="as-code-group"><div class="as-code-cat"><span class="tag tag-blue">${cat}</span> ${codes.length}개</div><div class="as-code-list">${codes.map(c=>`<span class="as-code">${c.code} ${c.name}</span>`).join('')}</div></div>`});
        let rows=tickets.map(a=>{const w=DB.getById('workers',a.workerId);let sc=a.status==='open'?'tag-red':a.status==='in_progress'?'tag-orange':'tag-green',st=a.status==='open'?'미처리':a.status==='in_progress'?'처리중':'완료';
            return `<tr><td style="font-family:monospace;font-size:11px">${a.id}</td><td>${HELPERS.formatDate(a.date)}</td><td style="font-family:monospace;font-size:11px;color:#6B7684">${a.origJobId}</td><td><span class="tag tag-blue">${a.cat}</span></td><td><span class="tag tag-purple">${a.code}</span></td><td style="font-size:12px">${a.issue}</td><td>${w?.name||'—'}</td><td><span class="tag ${sc}">${st}</span></td></tr>`}).join('');
        area.innerHTML=`<div class="kpi-grid" style="grid-template-columns:repeat(3,1fr)"><div class="kpi"><div class="kpi-top"><div class="kpi-label">미처리</div><div class="kpi-icon" style="background:#FFEEF0;color:#F04452">🔧</div></div><div class="kpi-value">${open.length} <span>건</span></div></div><div class="kpi"><div class="kpi-top"><div class="kpi-label">처리중</div><div class="kpi-icon" style="background:#FFF3E8;color:#D46B08">⏳</div></div><div class="kpi-value">${inP.length} <span>건</span></div></div><div class="kpi"><div class="kpi-top"><div class="kpi-label">AS율</div><div class="kpi-icon" style="background:#E8F4FD;color:#0077B6">📊</div></div><div class="kpi-value">${stats.asRate} <span>%</span></div></div></div>
        <div class="card"><div class="card-h"><div class="card-t">AS 유형코드</div></div>${acH}</div>
        <div class="card"><div class="card-h"><div class="card-t">AS 내역</div></div><div style="overflow-x:auto"><table class="tbl"><thead><tr><th>AS번호</th><th>접수일</th><th>원시공</th><th>카테고리</th><th>코드</th><th>증상</th><th>담당</th><th>상태</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
    } else if(p==='settings'){
        const comp=DB.getById('companies',cid);
        const priv=comp?.privacy||{showCustomerName:true,showCustomerPhone:true};
        area.innerHTML=`
        <div class="card">
            <div class="card-h"><div class="card-t">시공자 앱 고객정보 노출 설정</div></div>
            <div style="font-size:12px;color:#6B7684;margin-bottom:16px;line-height:1.6">시공자(기사) 앱에서 고객 정보를 어디까지 보여줄지 설정합니다.<br>비공개 시 시공자에게 마스킹 처리되어 표시됩니다. (예: 이** / 010-****-5678)</div>
            <div style="display:flex;flex-direction:column;gap:12px">
                <div style="display:flex;align-items:center;justify-content:space-between;padding:16px;background:#F7F8FA;border-radius:10px">
                    <div>
                        <div style="font-size:14px;font-weight:600">고객명 노출</div>
                        <div style="font-size:12px;color:#8B95A1;margin-top:2px">시공자 앱에서 고객 이름 전체 표시</div>
                    </div>
                    <label style="position:relative;display:inline-block;width:48px;height:28px;cursor:pointer">
                        <input type="checkbox" id="privName" ${priv.showCustomerName?'checked':''} onchange="savePrivacy()" style="opacity:0;width:0;height:0">
                        <span style="position:absolute;top:0;left:0;right:0;bottom:0;background:${priv.showCustomerName?'#35C5F0':'#D1D6DB'};border-radius:14px;transition:.3s"></span>
                        <span style="position:absolute;top:2px;left:${priv.showCustomerName?'22px':'2px'};width:24px;height:24px;background:#fff;border-radius:50%;transition:.3s;box-shadow:0 1px 3px rgba(0,0,0,.15)"></span>
                    </label>
                </div>
                <div style="display:flex;align-items:center;justify-content:space-between;padding:16px;background:#F7F8FA;border-radius:10px">
                    <div>
                        <div style="font-size:14px;font-weight:600">고객 연락처 노출</div>
                        <div style="font-size:12px;color:#8B95A1;margin-top:2px">시공자 앱에서 전화번호 전체 표시 및 전화 가능</div>
                    </div>
                    <label style="position:relative;display:inline-block;width:48px;height:28px;cursor:pointer">
                        <input type="checkbox" id="privPhone" ${priv.showCustomerPhone?'checked':''} onchange="savePrivacy()" style="opacity:0;width:0;height:0">
                        <span style="position:absolute;top:0;left:0;right:0;bottom:0;background:${priv.showCustomerPhone?'#35C5F0':'#D1D6DB'};border-radius:14px;transition:.3s"></span>
                        <span style="position:absolute;top:2px;left:${priv.showCustomerPhone?'22px':'2px'};width:24px;height:24px;background:#fff;border-radius:50%;transition:.3s;box-shadow:0 1px 3px rgba(0,0,0,.15)"></span>
                    </label>
                </div>
            </div>
            <div style="margin-top:16px;padding:12px;background:#FFF8E8;border:1px solid #FFE0A0;border-radius:8px;font-size:12px;color:#8B6914">
                ⚠️ 연락처를 비공개로 설정하면 시공자가 고객에게 직접 전화할 수 없습니다. 현장 도착/지연 등 연락이 필요한 경우 테크사 관리자를 통해 전달해야 합니다.
            </div>
        </div>
        <div class="card">
            <div class="card-h"><div class="card-t">현재 설정 미리보기</div></div>
            <div style="font-size:12px;color:#6B7684;margin-bottom:12px">시공자 앱에서 고객 정보가 이렇게 보입니다:</div>
            <div style="background:#F7F8FA;border-radius:10px;padding:16px">
                <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #E5E8EB;font-size:13px"><span style="color:#8B95A1">고객명</span><span style="font-weight:600">${priv.showCustomerName?'이정훈':'이**'}</span></div>
                <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #E5E8EB;font-size:13px"><span style="color:#8B95A1">연락처</span><span style="font-weight:600">${priv.showCustomerPhone?'010-1234-5678':'010-****-5678'}</span></div>
                <div style="display:flex;justify-content:space-between;padding:6px 0;font-size:13px"><span style="color:#8B95A1">전화 버튼</span><span style="font-weight:600">${priv.showCustomerPhone?'<span class="tag tag-green">활성</span>':'<span class="tag tag-gray">비활성 (🔒 비공개)</span>'}</span></div>
            </div>
        </div>
        <div class="card">
            <div class="card-h"><div class="card-t">외부 체크리스트 연동</div></div>
            <div style="font-size:12px;color:#6B7684;margin-bottom:16px;line-height:1.6">카테고리별 실측/시공 체크리스트 URL을 등록하면 시공자 앱과 시공 상세에서 바로 열 수 있습니다.</div>
            <div id="checklistSettings"></div>
        </div>`;
        // 체크리스트 URL 렌더
        renderChecklistSettings();
    }
}
function renderChecklistSettings(){
    const comp=DB.getById('companies',cid);
    const checklists=comp?.checklists||{};
    const cats=comp?.cats||[];
    let h='';
    cats.forEach(cat=>{
        const url=checklists[cat]||'';
        h+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
            <span class="tag tag-blue" style="min-width:60px;text-align:center">${cat}</span>
            <input type="text" class="form-input" style="flex:1" id="cl_${cat}" value="${url}" placeholder="Google Sheets 또는 Apps Script 웹앱 URL 입력">
            <button class="btn btn-primary btn-sm" onclick="saveChecklist('${cat}')">저장</button>
        </div>`;
    });
    h+=`<div style="margin-top:12px;padding:12px;background:#F0F7FF;border:1px solid #B8D8FF;border-radius:8px;font-size:12px;color:#1A5DAB;line-height:1.6">
        ℹ️ Google Sheets URL 또는 Apps Script 배포 URL을 입력하세요.<br>
        시공자 앱 시공 상세 화면에 <strong>"실측 체크리스트 열기"</strong> 버튼이 표시됩니다.
    </div>`;
    document.getElementById('checklistSettings').innerHTML=h;
}
function saveChecklist(cat){
    const url=document.getElementById('cl_'+cat).value.trim();
    const comp=DB.getById('companies',cid);
    const checklists=comp?.checklists||{};
    checklists[cat]=url;
    DB.update('companies',cid,{checklists});
    showToast(cat+' 체크리스트 URL이 저장되었습니다');
}
function savePrivacy(){
    const name=document.getElementById('privName').checked;
    const phone=document.getElementById('privPhone').checked;
    DB.update('companies',cid,{privacy:{showCustomerName:name,showCustomerPhone:phone}});
    showToast('권한 설정이 저장되었습니다');
    setTimeout(()=>render('settings'),300);
}
// ===== AS 등록 =====
let _asDoneJobs=[];
function openAsModal(){
    _asDoneJobs=DB.getAll('jobs').filter(j=>j.companyId===cid&&j.status==='done').sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time));
    // 월 드롭다운: 완료건이 있는 월만
    const months=[...new Set(_asDoneJobs.map(j=>j.date?.substring(0,7)).filter(Boolean))].sort().reverse();
    document.getElementById('asMonth').innerHTML='<option value="">전체 월</option>'+months.map(m=>`<option value="${m}">${m.replace('-','년 ')}월</option>`).join('');
    document.getElementById('asSearch').value='';
    filterAsJobs();
    document.getElementById('asOrigInfo').style.display='none';
    document.getElementById('asCat').value='';
    document.getElementById('asCode').innerHTML='<option>시공건을 선택하세요</option>';
    document.getElementById('asIssue').value='';
    document.getElementById('asCustomer').value='';
    document.getElementById('asPhone').value='';
    const ws=DB.getAll('workers').filter(w=>w.companyId===cid);
    document.getElementById('asWorker').innerHTML=ws.map(w=>`<option value="${w.id}">${w.name} (${w.skill})</option>`).join('');
    document.getElementById('asModal').classList.add('show');
}
function filterAsJobs(){
    const month=document.getElementById('asMonth').value;
    const keyword=document.getElementById('asSearch').value.trim().toLowerCase();
    let filtered=_asDoneJobs;
    if(month) filtered=filtered.filter(j=>j.date?.startsWith(month));
    if(keyword) filtered=filtered.filter(j=>{
        const w=DB.getById('workers',j.workerId);
        const text=`${j.id} ${j.customer} ${j.addr} ${j.cat} ${j.type||''} ${w?.name||''}`.toLowerCase();
        return text.includes(keyword);
    });
    const list=document.getElementById('asJobList');
    const selId=document.getElementById('asOrigJob').value;
    if(!filtered.length){
        list.innerHTML='<div style="text-align:center;padding:20px;color:#ADB5BD;font-size:12px">검색 결과 없음</div>';
    } else {
        list.innerHTML=filtered.map(j=>{
            const w=DB.getById('workers',j.workerId);
            const sel=j.id===selId?'background:#E8F4FD;border-left:3px solid #35C5F0':'border-left:3px solid transparent';
            return `<div onclick="selectAsJob('${j.id}')" style="padding:10px 12px;border-bottom:1px solid #F2F4F6;cursor:pointer;${sel};transition:background .1s" onmouseover="this.style.background='#F7F8FA'" onmouseout="this.style.background='${j.id===selId?'#E8F4FD':'#fff'}'">
                <div style="display:flex;justify-content:space-between;align-items:center">
                    <span style="font-size:12px;font-weight:600">${j.date} ${j.time} · <span class="tag tag-blue">${j.cat}</span></span>
                    <span style="font-size:11px;color:#6B7684">${w?.name||'—'}</span>
                </div>
                <div style="font-size:11px;color:#8B95A1;margin-top:3px">${j.customer} · ${j.addr.length>30?j.addr.substring(0,30)+'…':j.addr}</div>
            </div>`;
        }).join('');
    }
    document.getElementById('asJobCount').textContent=`(${filtered.length}건)`;
}
function selectAsJob(jobId){
    document.getElementById('asOrigJob').value=jobId;
    filterAsJobs(); // 선택 상태 표시 갱신
    onAsJobSelect();
}
function closeAsModal(){document.getElementById('asModal').classList.remove('show')}
function onAsJobSelect(){
    const jobId=document.getElementById('asOrigJob').value;
    if(!jobId){document.getElementById('asOrigInfo').style.display='none';return}
    const j=DB.getById('jobs',jobId);
    if(!j){document.getElementById('asOrigInfo').style.display='none';return}
    const w=DB.getById('workers',j.workerId);
    document.getElementById('asOrigInfo').style.display='block';
    document.getElementById('asOrigInfo').innerHTML=`<strong>${j.id}</strong> — ${j.date} ${j.time}<br>📁 ${j.cat} · ${j.type||''}<br>📍 ${j.addr}<br>👤 ${j.customer} · ${j.phone}<br>👷 ${w?.name||'—'}`;
    document.getElementById('asCat').value=j.cat;
    // AS 코드 로드
    const codes=AS_CODES[j.cat]||[];
    document.getElementById('asCode').innerHTML=codes.map(c=>`<option value="${c.code}">${c.code} — ${c.name}</option>`).join('');
    document.getElementById('asCustomer').value=j.customer;
    document.getElementById('asPhone').value=j.phone;
    // 기본 담당자: 원시공 기사
    if(j.workerId){document.getElementById('asWorker').value=j.workerId}
}
function submitAS(){
    const jobId=document.getElementById('asOrigJob').value;
    const code=document.getElementById('asCode').value;
    const issue=document.getElementById('asIssue').value.trim();
    const workerId=document.getElementById('asWorker').value;
    if(!jobId){showToast('원시공 건을 선택하세요');return}
    if(!issue){showToast('증상/이슈를 입력하세요');return}
    const j=DB.getById('jobs',jobId);
    const cat=document.getElementById('asCat').value;
    const customer=document.getElementById('asCustomer').value;
    const phone=document.getElementById('asPhone').value;
    const asId=DB.genId('AS');
    DB.add('asTickets',{id:asId,companyId:cid,origJobId:jobId,workerId:workerId||null,date:new Date().toISOString().substring(0,10),cat,code,issue,customer,phone,status:'open',visitDate:null,resolution:null,createdAt:new Date().toISOString()});
    // 시공자앱 알림
    if(workerId){
        DB.add('notifications',{id:DB.genId('n'),target:workerId,type:'as',title:'AS 건 배정',desc:`${cat} ${code} — ${issue}`,read:false,createdAt:new Date().toISOString()});
    }
    closeAsModal();showToast('AS가 접수되었습니다 ('+asId+')');render(currentPage);
}

DB.listenSync(()=>{render(currentPage)});
</script>
</body>
</html>
